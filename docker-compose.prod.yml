services:
  osdaily:
    build: .
    restart: unless-stopped
    environment:
      CONTACT_EMAIL: "${CONTACT_EMAIL:?CONTACT_EMAIL is required}"
      DAILY_WEBHOOK_URL: "${DAILY_WEBHOOK_URL:-}"
      DAILY_WEBHOOK_TYPE: "${DAILY_WEBHOOK_TYPE:-generic}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4.1-mini}"
      TWITTER_BEARER_TOKEN: "${TWITTER_BEARER_TOKEN:-}"
      TWITTER_OPEN_SOURCE_KOL_LIST_ID: "${TWITTER_OPEN_SOURCE_KOL_LIST_ID:-}"
      ADMIN_TOKEN: "${ADMIN_TOKEN:?ADMIN_TOKEN is required}"
      SCHEDULE_TIME: "${SCHEDULE_TIME:-06:00}"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./configs:/app/configs:ro
    command: ["python", "-m", "osdaily.cli", "serve", "--host", "0.0.0.0", "--port", "8765", "--schedule", "--schedule-time", "${SCHEDULE_TIME:-06:00}", "--notify"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/healthz', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      osdaily:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: "${DOMAIN:?DOMAIN is required}"
      CONTACT_EMAIL: "${CONTACT_EMAIL:?CONTACT_EMAIL is required}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
