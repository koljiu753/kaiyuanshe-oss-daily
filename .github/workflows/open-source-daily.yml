name: Open Source Daily

on:
  workflow_dispatch:
    inputs:
      days:
        description: Lookback days
        required: false
        default: "1"
  schedule:
    # 06:00 Asia/Shanghai is 22:00 UTC on the previous day.
    - cron: "0 22 * * *"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: python -m pip install -e .[dev]

      - name: Test
        run: python -m pytest

      - name: Validate config
        run: python -m osdaily.cli validate

      - name: Readiness audit
        run: python -m osdaily.cli readiness

      - name: Generate report
        env:
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          DAILY_WEBHOOK_URL: ${{ secrets.DAILY_WEBHOOK_URL }}
          TRANSLATION_PROVIDER: ${{ vars.TRANSLATION_PROVIDER || 'deepseek' }}
          TRANSLATE_ENABLED: ${{ vars.TRANSLATE_ENABLED || 'true' }}
          REWRITE_SUMMARY_ENABLED: ${{ vars.REWRITE_SUMMARY_ENABLED || 'true' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          MOONSHOT_MODEL: ${{ vars.MOONSHOT_MODEL || 'kimi-k2.6' }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          TWITTER_OPEN_SOURCE_KOL_LIST_ID: ${{ secrets.TWITTER_OPEN_SOURCE_KOL_LIST_ID }}
        run: |
          DAYS="${{ github.event.inputs.days || '1' }}"
          osdaily run --days "$DAYS" --notify

      - name: Commit report
        run: |
          git config user.name "opensource-daily-bot"
          git config user.email "opensource-daily-bot@users.noreply.github.com"
          git add data/osdaily.sqlite3 output/daily/*.md output/daily/*.json
          git commit -m "Generate open source daily report" || echo "No changes to commit"
          git push
